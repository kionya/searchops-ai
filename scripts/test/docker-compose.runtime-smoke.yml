services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: searchops_smoke
      POSTGRES_PASSWORD: searchops
      POSTGRES_USER: searchops
    ports:
      - "${SEARCHOPS_SMOKE_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U searchops -d searchops_smoke"]
      interval: 2s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${SEARCHOPS_SMOKE_REDIS_PORT:-56379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 20
