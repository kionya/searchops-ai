name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  migration-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: searchops_ci
          POSTGRES_PASSWORD: searchops
          POSTGRES_USER: searchops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U searchops -d searchops_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://searchops:searchops@localhost:5432/searchops_ci?schema=public
      # CI postgres is a direct connection, so directUrl == url here.
      DIRECT_DATABASE_URL: postgresql://searchops:searchops@localhost:5432/searchops_ci?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @searchops/db db:generate

      - name: Deploy migrations
        run: pnpm db:migrate:deploy

      - name: Check migration status
        run: pnpm db:migrate:status
